<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Jimpitan Kampung Premium</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo"><i class="ti ti-building-community"></i></div>
        <div class="login-title">Jimpitan Kampung</div>
        <div class="login-subtitle">Sistem Iuran Warga Digital</div>
      </div>
      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="loginUsername" class="form-input" placeholder="Masukkan username" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" required />
        </div>
        <button type="submit" class="btn-login">
          <i class="ti ti-login-2"></i> Masuk Sistem
        </button>
      </form>
      <div class="login-info">
        <strong style="display:block;margin-bottom:8px"><i class="ti ti-info-circle"></i> Demo Credentials (Klik untuk
          Masuk):</strong>
        <div onclick="autoFillLogin('admin', 'password123')"
          style="display:flex;justify-content:space-between;cursor:pointer;padding:6px 8px;border-radius:8px;margin-bottom:4px;transition:background 0.2s;"
          class="demo-cred-row">
          <span>Admin</span> <strong>admin / password123</strong>
        </div>
        <div onclick="autoFillLogin('ketua', '123456')"
          style="display:flex;justify-content:space-between;cursor:pointer;padding:6px 8px;border-radius:8px;margin-bottom:4px;transition:background 0.2s;"
          class="demo-cred-row">
          <span>Ketua RT</span> <strong>ketua / 123456</strong>
        </div>
        <div onclick="autoFillLogin('bendahara', 'iuran2026')"
          style="display:flex;justify-content:space-between;cursor:pointer;padding:6px 8px;border-radius:8px;margin-bottom:4px;transition:background 0.2s;"
          class="demo-cred-row">
          <span>Bendahara</span> <strong>bendahara / iuran2026</strong>
        </div>
        <div onclick="autoFillLogin('warga', 'warga123')"
          style="display:flex;justify-content:space-between;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background 0.2s;"
          class="demo-cred-row">
          <span>Warga Umum</span> <strong>warga / warga123</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST COMPONENT -->
  <div class="toast" id="toastEl"></div>

  <!-- SCRIPTS -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    // Bootstrap minimal authentication state for login page
    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', checkAuth);
    } else {
      checkAuth();
    }
  </script>
</body>

</html>
